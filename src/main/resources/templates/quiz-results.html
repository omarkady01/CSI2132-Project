<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Results</title>
</head>
<body>

<h1>Find your Room Match Below!</h1>

<h3>Your Filters</h3>
<ul>
    <li>City: <span th:text="${searchFilter.city} ?: 'Any'"></span></li>
    <li>Capacity: <span th:text="${searchFilter.capacity} ?: 'Any'"></span></li>
    <li>Minimum Price: <span th:text="${searchFilter.minPrice} ?: 'Any'"></span></li>
    <li>Maximum Price: <span th:text="${searchFilter.maxPrice} ?: 'Any'"></span></li>
    <li>Check-in Date: <span th:text="${searchFilter.checkInDate} ?: 'Any'"></span></li>
    <li>Check-out Date: <span th:text="${searchFilter.checkOutDate} ?: 'Any'"></span></li>
</ul>

<table border="1">
    <tr>
        <th>Room ID</th>
        <th>Hotel ID</th>
        <th>Hotel Name</th>
        <th>Room Number</th>
        <th>City</th>
        <th>Rating</th>
        <th>Capacity</th>
        <th>Price</th>
        <th>View Type</th>
        <th>Extendable</th>
        <th>Problems</th>
        <th>Active</th>
        <th>Select Room</th>
    </tr>

    <tr th:each="room : ${rooms}">
        <td th:text="${room.roomId}"></td>
        <td th:text="${room.hotelId}"></td>
        <td th:text="${room.hotelName}"></td>
        <td th:text="${room.roomNumber}"></td>
        <td th:text="${room.city}"></td>
        <td th:text="${room.rating}"></td>
        <td th:text="${room.capacity}"></td>
        <td th:text="${room.price}"></td>
        <td th:text="${room.viewType}"></td>
        <td th:text="${room.extendable}"></td>
        <td th:text="${room.problems}"></td>
        <td th:text="${room.isActive}"></td>
        <td> 
            <form method="get" action="/booking">
                <input type="hidden" name="roomId" id="${room.roomId}">
                <button type="submit">Book Room!</button>
            </form>
        </td>
        
    </tr>
</table>

<br>
<a href="/quiz/city">Start New Quiz</a>

</body>
</html>
