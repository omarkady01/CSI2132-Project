<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Customers Manager</title>

    </head>
    <body>
        <h1>Customers</h1>
        <p th:if="${message}" th:text="${message}" style="color:red; font-weight:bold;"></p>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>ID Type</th>
                <th>ID Number</th>
                <th>Registered</th>
                <th>Delete</th>
            </tr>

            <tr th:each="c : ${customers}">
            <td th:text="${c.customerId}"></td>
            <td th:text="${c.custName}"></td>
            <td th:text="${c.address}"></td>
            <td th:text="${c.idType}"></td>
            <td th:text="${c.idNumber}"></td>
            <td th:text="${c.registrationDate}"></td>
            <td>
                <form method="post" action="/admin/customers/delete">
                    <input type="hidden" name="customerId" th:value="${c.customerId}">
                    <button onclick="return confirm('Delete customer?')">Delete</button>
                </form>
            </td>
        </tr>

        </table>
        <br>
        <a href="/">Return Home</a>
    </body>
</html>
